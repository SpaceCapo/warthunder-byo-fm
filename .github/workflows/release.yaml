name: Release on Tag Push

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract version
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare package
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          mkdir -p build/fm

          # Copy files into desired structure
          cp ./$VERSION/fm/fm_data_db.csv build/fm/
          cp ./$VERSION/fm/fm_names_db.csv build/fm/
          cp ./$VERSION/fm/version build/

          # Create version_tag file
          echo "$TAG" > build/version_tag

          # Zip it
          cd build
          zip -r warthunder-byo-fm.zip fm version version_tag

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.vars.outputs.tag }}
          files: build/warthunder-byo-fm.zip
          generate_release_notes: true
